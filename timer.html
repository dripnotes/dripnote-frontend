<!doctype html>

<html class="light" lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
      name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#1a1c1c",
              "on-error-container": "#93000a",
              "on-primary": "#ffffff",
              "surface-bright": "#f9f9f8",
              "on-tertiary-fixed": "#231915",
              "on-primary-container": "#c29c90",
              "secondary-fixed-dim": "#e4beb2",
              "on-tertiary-fixed-variant": "#51443f",
              "surface-container": "#eeeeed",
              "secondary-fixed": "#ffdbce",
              outline: "#827471",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              background: "#f9f9f8",
              "primary-fixed": "#ffdbd0",
              "surface-container-high": "#e8e8e7",
              "surface-dim": "#dadad9",
              "inverse-surface": "#2f3130",
              "tertiary-fixed": "#f2ded8",
              "on-primary-fixed-variant": "#5d4037",
              "on-error": "#ffffff",
              "surface-tint": "#77574d",
              "on-secondary-fixed": "#2b160f",
              "on-primary-fixed": "#2c160e",
              "inverse-on-surface": "#f1f1f0",
              "tertiary-fixed-dim": "#d6c3bc",
              "on-secondary-fixed-variant": "#5b4137",
              "on-tertiary-container": "#b3a19b",
              "surface-container-highest": "#e2e2e2",
              "surface-variant": "#e2e2e2",
              error: "#ba1a1a",
              "outline-variant": "#d4c3bf",
              tertiary: "#2e231f",
              "surface-container-low": "#f4f4f3",
              "on-tertiary": "#ffffff",
              "secondary-container": "#fed7ca",
              "primary-container": "#4f342b",
              "on-surface-variant": "#504442",
              "on-secondary": "#ffffff",
              primary: "#371f17",
              "inverse-primary": "#e7bdb1",
              "primary-fixed-dim": "#e7bdb1",
              "on-background": "#1a1c1c",
              secondary: "#75584d",
              "on-secondary-container": "#795c51",
              "tertiary-container": "#443833",
              surface: "#f9f9f8",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Be Vietnam Pro"],
              label: ["Be Vietnam Pro"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      .timer-glow {
        text-shadow: 0 0 40px rgba(255, 219, 208, 0.2);
      }
      .glass-panel {
        background: rgba(26, 28, 28, 0.85);
        backdrop-filter: blur(24px);
      }
      .curve-path {
        stroke-dasharray: 1000;
        stroke-dashoffset: 200;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-primary text-on-primary font-body select-none overflow-hidden">
    <!-- Focused Brew Header -->
    <header
      class="fixed top-0 w-full z-50 flex justify-between items-center px-6 pt-12 pb-6">
      <button
        class="w-10 h-10 flex items-center justify-center rounded-full bg-primary-container/40 text-on-primary active:scale-95 transition-all">
        <span class="material-symbols-outlined">close</span>
      </button>
      <div class="flex flex-col items-center">
        <span
          class="text-secondary-fixed-dim font-label text-[10px] tracking-[0.2em] uppercase mb-0.5"
          >Ethiopia Yirgacheffe</span
        >
        <div
          class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-secondary-container/10 border border-outline-variant/10">
          <span
            class="w-1.5 h-1.5 rounded-full bg-secondary-fixed animate-pulse"></span>
          <span
            class="text-secondary-fixed text-[10px] font-medium tracking-wider"
            >Acaia Lunar Connected</span
          >
        </div>
      </div>
      <button
        class="w-10 h-10 flex items-center justify-center rounded-full bg-primary-container/40 text-on-primary active:scale-95 transition-all">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </header>
    <main
      class="h-screen flex flex-col items-center justify-center px-6 pt-20 pb-32">
      <!-- Timer Progress Ring Placeholder (Abstract Visual) -->
      <div class="relative w-72 h-72 flex items-center justify-center mb-8">
        <svg class="absolute inset-0 w-full h-full -rotate-90">
          <circle
            cx="50%"
            cy="50%"
            fill="transparent"
            r="130"
            stroke="rgba(255,255,255,0.05)"
            stroke-width="4"></circle>
          <circle
            cx="50%"
            cy="50%"
            fill="transparent"
            r="130"
            stroke="url(#gradient-timer)"
            stroke-dasharray="816"
            stroke-dashoffset="300"
            stroke-linecap="round"
            stroke-width="8"></circle>
          <defs>
            <lineargradient
              id="gradient-timer"
              x1="0%"
              x2="100%"
              y1="0%"
              y2="0%">
              <stop offset="0%" stop-color="#ffdbd0"></stop>
              <stop offset="100%" stop-color="#77574d"></stop>
            </lineargradient>
          </defs>
        </svg>
        <div class="text-center">
          <div
            class="text-[5rem] font-headline font-extrabold tracking-tighter leading-none timer-glow">
            01:42
          </div>
          <div
            class="text-secondary-fixed-dim font-label text-xs tracking-widest mt-2">
            BREWING PHASE
          </div>
        </div>
      </div>
      <!-- Real-time Weights Grid -->
      <div class="w-full grid grid-cols-2 gap-4 mb-8">
        <div
          class="bg-primary-container/30 rounded-xl p-5 flex flex-col items-center border border-white/5">
          <span
            class="text-secondary-fixed-dim font-label text-[10px] tracking-widest mb-1"
            >CURRENT WEIGHT</span
          >
          <div class="flex items-baseline gap-1">
            <span class="text-2xl font-bold font-headline">168.4</span>
            <span class="text-sm font-medium opacity-50">g</span>
          </div>
        </div>
        <div
          class="bg-primary-container/30 rounded-xl p-5 flex flex-col items-center border border-white/5">
          <span
            class="text-secondary-fixed-dim font-label text-[10px] tracking-widest mb-1"
            >TARGET WEIGHT</span
          >
          <div class="flex items-baseline gap-1">
            <span class="text-2xl font-bold font-headline text-secondary-fixed"
              >240.0</span
            >
            <span class="text-sm font-medium opacity-50">g</span>
          </div>
        </div>
      </div>
      <!-- Step Instructions Card -->
      <div
        class="w-full bg-surface-container-lowest/10 backdrop-blur-md rounded-2xl p-6 border border-white/10 flex items-center gap-5 relative overflow-hidden">
        <div
          class="absolute right-0 top-0 bottom-0 w-24 opacity-10 pointer-events-none">
          <svg class="h-full w-full" viewbox="0 0 100 100">
            <path
              d="M0,80 Q25,50 50,80 T100,20"
              fill="none"
              stroke="white"
              stroke-width="2"></path>
          </svg>
        </div>
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            <span
              class="bg-secondary-fixed text-on-secondary-fixed text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-tighter"
              >Phase 2</span
            >
            <span class="text-secondary-fixed-dim text-xs font-medium"
              >Main Pour</span
            >
          </div>
          <h2 class="text-xl font-headline font-bold mb-1">
            2단계: 120g 까지 붓기
          </h2>
          <p class="text-on-primary/60 text-sm leading-relaxed">
            나선형을 그리며 부드럽게 푸어링 하세요.
          </p>
        </div>
        <div class="flex flex-col items-center gap-2">
          <div
            class="w-12 h-12 rounded-full border-2 border-secondary-fixed flex items-center justify-center">
            <span class="text-secondary-fixed font-bold text-sm">+80g</span>
          </div>
          <span
            class="text-[9px] font-bold tracking-widest text-secondary-fixed-dim uppercase"
            >Next</span
          >
        </div>
      </div>
    </main>
    <!-- Bottom Interactive Layer -->
    <div class="fixed bottom-0 left-0 w-full z-50">
      <!-- Control Bar -->
      <div class="px-6 pb-10 pt-4 flex items-center justify-between gap-4">
        <button
          class="w-14 h-14 rounded-full bg-primary-container/60 border border-white/10 flex items-center justify-center text-on-primary active:scale-90 transition-all">
          <span class="material-symbols-outlined text-2xl">refresh</span>
        </button>
        <button
          class="flex-1 h-16 rounded-full bg-gradient-to-br from-secondary-fixed to-secondary-fixed-dim text-on-primary-fixed font-headline font-extrabold text-lg flex items-center justify-center shadow-lg active:scale-[0.98] transition-all">
          <span
            class="material-symbols-outlined mr-2"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >pause</span
          >
          PAUSE BREW
        </button>
        <div class="flex flex-col gap-2">
          <button
            class="w-10 h-10 rounded-full bg-primary-container/40 border border-white/5 flex items-center justify-center text-secondary-fixed active:scale-90 transition-all">
            <span
              class="material-symbols-outlined text-xl"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >volume_up</span
            >
          </button>
          <button
            class="w-10 h-10 rounded-full bg-primary-container/40 border border-white/5 flex items-center justify-center text-secondary-fixed active:scale-90 transition-all">
            <span class="material-symbols-outlined text-xl">vibration</span>
          </button>
        </div>
      </div>
      <!-- Step List Handle -->
      <div
        class="bg-surface-container-low/10 backdrop-blur-xl rounded-t-[2.5rem] border-t border-white/5 pt-3 pb-8 px-8 flex flex-col items-center shadow-[0_-8px_40px_rgba(0,0,0,0.3)]">
        <div class="w-12 h-1.5 rounded-full bg-white/20 mb-6"></div>
        <div class="w-full flex justify-between items-end mb-2">
          <div class="flex flex-col">
            <span
              class="text-on-primary/40 text-[10px] font-bold tracking-widest uppercase mb-1"
              >Recipe Progress</span
            >
            <div class="flex gap-1">
              <div class="w-8 h-1 rounded-full bg-secondary-fixed"></div>
              <div
                class="w-8 h-1 rounded-full bg-secondary-fixed animate-pulse"></div>
              <div class="w-8 h-1 rounded-full bg-white/10"></div>
              <div class="w-8 h-1 rounded-full bg-white/10"></div>
              <div class="w-8 h-1 rounded-full bg-white/10"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span
              class="text-[10px] font-bold tracking-widest text-secondary-fixed-dim uppercase"
              >Step 2 of 5</span
            >
            <span class="material-symbols-outlined text-on-primary/40 text-lg"
              >expand_less</span
            >
          </div>
        </div>
      </div>
    </div>
    <!-- Hidden gradient background elements for depth -->
    <div
      class="fixed top-[-10%] right-[-20%] w-[80%] h-[50%] bg-secondary-fixed/5 blur-[120px] rounded-full -z-10"></div>
    <div
      class="fixed bottom-[-10%] left-[-20%] w-[80%] h-[50%] bg-primary-container/20 blur-[120px] rounded-full -z-10"></div>
  </body>
</html>
